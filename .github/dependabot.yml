version: 2
updates:
  # UBI base images in the Containerfiles. Pinned by digest, so Dependabot
  # opens a PR both when a new minor ships and when an existing minor is
  # rebuilt (e.g. for CVE fixes). Containerfiles must start with the literal
  # "Containerfile" prefix for Dependabot's docker file-updater to write to
  # them — that's why we use Containerfile.rhel{8,9,10} rather than the
  # original RHEL{8,9,10}-Containerfile naming.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      ubi-base-images:
        patterns:
          - "registry.access.redhat.com/ubi*"
    # RHEL 8.10 is the final RHEL 8 minor — Red Hat will not ship 8.11+.
    # Red Hat does publish build-tagged variants of 8.10 (e.g.
    # 8.10-1304.1751400627) for specific builds. Dependabot interprets
    # these as version bumps, but its file-updater rejects the resulting
    # tag-format change with 'dependency_file_not_supported'. We ignore
    # all semver-classified updates for ubi8 to suppress the noise.
    # Digest-only updates (CVE rebuilds of :8.10) still come through.
    ignore:
      - dependency-name: "registry.access.redhat.com/ubi8/ubi"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  # GitHub Actions used in .github/workflows. Catches deprecations (e.g.
  # actions/checkout moving to Node.js 24) without manual tracking.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"

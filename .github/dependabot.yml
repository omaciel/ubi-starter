version: 2
updates:
  # UBI base images in the Containerfiles. Pinned by digest, so Dependabot
  # opens a PR both when a new minor ships and when an existing minor is
  # rebuilt (e.g. for CVE fixes). Containerfiles must start with the literal
  # "Containerfile" prefix for Dependabot's docker file-updater to write to
  # them — that's why we use Containerfile.rhel{8,9,10} rather than the
  # original RHEL{8,9,10}-Containerfile naming.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      ubi-base-images:
        patterns:
          - "registry.access.redhat.com/ubi*"
    # Note on ubi8: Containerfile.rhel8 pins :latest@digest rather than
    # :8.10@digest. RHEL 8.10 is the terminal RHEL 8 release, and Red Hat
    # publishes build-tagged variants (e.g. 8.10-1304.1751400627) that
    # Dependabot's docker file-updater fails to write back. Tracking the
    # :latest tag confines updates to digest-only changes, which sidesteps
    # the tag-format bug while still flagging CVE-driven respins.

  # GitHub Actions used in .github/workflows. Catches deprecations (e.g.
  # actions/checkout moving to Node.js 24) without manual tracking.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
